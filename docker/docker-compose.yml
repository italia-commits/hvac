version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: hvac-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: hvac_renewiq
      POSTGRES_USER: hvac_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hvac_user -d hvac_renewiq"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hvac-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: hvac-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://hvac_user:${DB_PASSWORD:-change-me}@db:5432/hvac_renewiq
      DATABASE_SSL: "false"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${API_URL:-http://localhost:3000}/api/auth/google/callback
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@hvacrenevq.com}
      SENDGRID_FROM_NAME: HVAC RenewIQ
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_GROWTH: ${STRIPE_PRICE_GROWTH:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      API_URL: ${API_URL:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "3000:3000"
    networks:
      - hvac-network

  # Frontend (Nginx)
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: hvac-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - hvac-network

volumes:
  postgres_data:
    driver: local

networks:
  hvac-network:
    driver: bridge